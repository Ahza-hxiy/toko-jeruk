<!-- FILE : keranjang.html -->
<!-- ===================================== -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

:root{
    --orange:#ff8c00;
    --glass-bg:rgba(255,255,255,0.18);
    --glass-border:rgba(255,255,255,0.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#FFB75E 0%,#ED8F03 100%);
    background-attachment:fixed;
    padding:20px;
    color:white;
}

/* ========================= */
/* GLASS EFFECT */
/* ========================= */

.glass{
    background:var(--glass-bg);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid var(--glass-border);
    box-shadow:0 8px 32px rgba(0,0,0,0.12);
    border-radius:22px;
}

/* ========================= */
/* CONTAINER */
/* ========================= */

.container{
    max-width:900px;
    margin:auto;
}

/* ========================= */
/* HEADER */
/* ========================= */

.top-bar{
    padding:18px 22px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:16px;
}

.title{
    font-size:24px;
    font-weight:bold;
}

/* ========================= */
/* CART ITEM */
/* ========================= */

.cart-item{
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
    margin-bottom:18px;
}

.cart-img{
    width:100px;
    height:100px;
    border-radius:18px;
    object-fit:cover;
}

.item-info{
    flex:1;
}

.item-name{
    font-size:19px;
    font-weight:bold;
    margin-bottom:6px;
}

.item-price{
    font-size:17px;
    opacity:0.9;
}

.qty-box{
    margin-top:12px;
    display:flex;
    align-items:center;
    gap:12px;
}

.qty-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    background:white;
    color:var(--orange);
}

.qty-text{
    font-size:18px;
    font-weight:bold;
}

.delete-btn{
    background:#ff3f34;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

/* ========================= */
/* TOTAL BOX */
/* ========================= */

.total-box{
    padding:25px;
    margin-top:30px;
    text-align:center;
}

.total-title{
    font-size:20px;
    margin-bottom:12px;
}

.total-price{
    font-size:35px;
    font-weight:bold;
    margin-bottom:22px;
}

.checkout-btn{
    width:100%;
    border:none;
    padding:16px;
    border-radius:18px;
    background:white;
    color:var(--orange);
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.checkout-btn:hover{
    transform:scale(1.02);
}

/* ========================= */
/* EMPTY */
/* ========================= */

.empty{
    text-align:center;
    padding:70px 20px;
    font-size:20px;
    font-weight:bold;
}

/* ========================= */
/* QRIS POPUP */
/* ========================= */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:9999;
}

.popup-content{
    width:100%;
    max-width:420px;
    padding:25px;
    text-align:center;
    animation:popUp 0.3s ease;
}

@keyframes popUp{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.popup-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.popup-total{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.qris-image{
    width:260px;
    max-width:100%;
    border-radius:18px;
    margin-bottom:18px;
    background:white;
    padding:10px;
}

.popup-desc{
    font-size:15px;
    line-height:1.5;
    margin-bottom:20px;
}

/* ========================= */
/* PAYMENT BUTTON */
/* ========================= */

.payments{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.pay-btn{
    border:none;
    padding:12px 18px;
    border-radius:15px;
    background:white;
    color:#ff8c00;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    transform:scale(1.05);
}

.close-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:white;
    color:var(--orange);
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:700px){

    .cart-item{
        flex-direction:column;
        text-align:center;
    }

    .item-info{
        width:100%;
    }

    .qty-box{
        justify-content:center;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="top-bar glass">

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Kembali
        </a>

        <div class="title">
            Keranjang
        </div>

    </div>

    <!-- CART -->
    <div id="cart-container"></div>

    <!-- TOTAL -->
    <div class="total-box glass">

        <div class="total-title">
            Total Pembayaran
        </div>

        <div class="total-price" id="total-price">
            Rp0
        </div>

        <button class="checkout-btn" onclick="openPopup()">
            <i class="fa-solid fa-qrcode"></i>
            Checkout Sekarang
        </button>

    </div>

</div>

<!-- ===================================== -->
<!-- POPUP QRIS -->
<!-- ===================================== -->

<div class="popup" id="popup">

    <div class="popup-content glass">

        <div class="popup-title">
            Pembayaran QRIS
        </div>

        <div class="popup-total" id="popup-total">
            Rp0
        </div>

        <!-- GANTI qris.png DENGAN QRIS KAMU -->
        <img src="qris.png" class="qris-image">

        <div class="popup-desc">
            Pilih aplikasi pembayaran favorit kamu
        </div>

        <!-- PAYMENT BUTTON -->
        <div class="payments">

            <button class="pay-btn"
            onclick="openGopay()">

                <i class="fa-solid fa-wallet"></i>
                GoPay

            </button>

            <button class="pay-btn"
            onclick="openDana()">

                <i class="fa-solid fa-wallet"></i>
                DANA

            </button>

            <button class="pay-btn"
            onclick="openShopeePay()">

                <i class="fa-solid fa-wallet"></i>
                ShopeePay

            </button>

        </div>

        <button class="close-btn"
        onclick="closePopup()">

            Saya Sudah Bayar

        </button>

    </div>

</div>

<script>

/* ========================= */
/* LOAD CART */
/* ========================= */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ========================= */
/* RENDER CART */
/* ========================= */

function renderCart(){

    const container =
    document.getElementById("cart-container");

    if(cart.length === 0){

        container.innerHTML = `
        
        <div class="glass empty">
            Keranjang masih kosong
        </div>

        `;

        document.getElementById("total-price")
        .innerText = "Rp0";

        return;
    }

    let total = 0;

    container.innerHTML = "";

    cart.forEach((item,index)=>{

        let subtotal = item.price * item.qty;

        total += subtotal;

        container.innerHTML += `
        
        <div class="cart-item glass">

            <img src="${item.image}"
            class="cart-img">

            <div class="item-info">

                <div class="item-name">
                    ${item.name}
                </div>

                <div class="item-price">
                    Rp${item.price.toLocaleString("id-ID")}
                </div>

                <div class="qty-box">

                    <button class="qty-btn"
                    onclick="changeQty(${index},-1)">
                        -
                    </button>

                    <div class="qty-text">
                        ${item.qty}
                    </div>

                    <button class="qty-btn"
                    onclick="changeQty(${index},1)">
                        +
                    </button>

                </div>

            </div>

            <button class="delete-btn"
            onclick="removeItem(${index})">

                <i class="fa-solid fa-trash"></i>

            </button>

        </div>
        
        `;
    });

    document.getElementById("total-price")
    .innerText =
    "Rp" + total.toLocaleString("id-ID");
}

/* ========================= */
/* CHANGE QTY */
/* ========================= */

function changeQty(index,change){

    cart[index].qty += change;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    saveCart();
}

/* ========================= */
/* REMOVE */
/* ========================= */

function removeItem(index){

    cart.splice(index,1);

    saveCart();
}

/* ========================= */
/* SAVE */
/* ========================= */

function saveCart(){

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCart();
}

/* ========================= */
/* OPEN POPUP */
/* ========================= */

function openPopup(){

    if(cart.length === 0){

        alert("Keranjang masih kosong!");

        return;
    }

    let total = 0;

    cart.forEach(item=>{
        total += item.price * item.qty;
    });

    document.getElementById("popup-total")
    .innerText =
    "Rp" + total.toLocaleString("id-ID");

    document.getElementById("popup")
    .style.display = "flex";
}

/* ========================= */
/* CLOSE POPUP */
/* ========================= */

function closePopup(){

    // TUTUP POPUP
    document.getElementById("popup")
    .style.display = "none";

    // HAPUS KERANJANG
    localStorage.removeItem("cart");

    // KOSONGKAN ARRAY
    cart = [];

    // RENDER ULANG
    renderCart();

    // ALERT
    alert("Pembayaran berhasil 😊");
}

/* ========================= */
/* OPEN E-WALLET */
/* ========================= */

function openGopay(){

    window.location.href =
    "https://gojek.link/gopay";
}

function openDana(){

    window.location.href =
    "https://link.dana.id";
}

function openShopeePay(){

    window.location.href =
    "https://shopee.co.id/m/shopee-pay";
}

/* ========================= */
/* START */
/* ========================= */

renderCart();

</script>

</body>
</html>
